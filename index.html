<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Contact form</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="main-card">

      
  <form action="">
    <h1 class="title">Contact Us</h1>
    <div class="names">
      <label for="firstName" >First Name</label>
      <label for="lastName" >Last Name</label>
    </div>
    <div class="name-inputs">
    <input type="text" name="firstName" class="firstName">
    <input type="text" name="lastName" class="lastName">
  </div>
   
    
    <div class="mail">
      <label for="email">Email Address</label>
      <input type="email" name="email" class="email" >
    </div>
  
<label for="query"> Query Type</label>
    <div class="query">
      <div class="general"><input type="radio" name="general" >General Enquiry</div>
  <div class="support"><input type="radio" name="support" >Support Request</div>
  
    </div>
  <!-- Please select a query type -->
  <label for="Message">Message</label>
  <div>
  <textarea name="Message" id="Message" cols="65" rows="7"></textarea>
</div>
  <div>
    <label for="custom-radio" >
  <input type="checkbox"><span></span> I consent to being contacted by the team
  <!-- To submit this form, please consent to being contacted -->
    </label>
</div>

  <button>Submit</button>

  <!-- Message Sent!
  Thanks for completing the form. We'll be in touch soon! -->
</form>
  </div>

</div>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/FaithAchieng">Faith Achieng</a>.
  </div>
</body>
</html>
